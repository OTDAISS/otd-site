<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hatteras Nexus | The Sovereign Island</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;900&display=swap');
        :root { --neon: linear-gradient(135deg, #ff007f 0%, #ff8c00 30%, #00d2ff 70%, #00f5d4 100%); }
        body { font-family: 'Outfit', sans-serif; background-color: #020617; color: white; overflow-x: hidden; transition: background 1s ease; }
        .neon-sunset { background: var(--neon); background-size: 400% 400%; animation: ripple 12s ease infinite; }
        @keyframes ripple { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Modal - Hidden by default */
        #activation-modal { display: none; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center; background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(20px); }
        #activation-modal.active { display: flex; }
        
        .scan-line { width: 100%; height: 2px; background: #00f5d4; position: absolute; top: 0; animation: scan 2s linear infinite; box-shadow: 0 0 15px #00f5d4; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body class="flex">

    <div id="activation-modal">
        <div class="glass max-w-lg w-full p-12 rounded-[3rem] text-center relative overflow-hidden shadow-2xl border-t-4 border-cyan-400">
            <div id="scanner" class="scan-line hidden"></div>
            
            <div id="step-loading">
                <i class="fa-solid fa-microchip text-5xl text-cyan-400 mb-6 animate-spin"></i>
                <h3 id="modal-title" class="text-3xl font-black uppercase italic mb-2">Syncing Node...</h3>
                <div class="w-full bg-white/10 h-1 rounded-full overflow-hidden mt-6"><div id="bar" class="neon-sunset h-full w-0 transition-all duration-[1500ms]"></div></div>
            </div>

            <div id="step-email" class="hidden">
                <h3 class="text-3xl font-black uppercase italic mb-4">Identity Required</h3>
                <form id="node-form" class="space-y-4">
                    <input type="email" id="email-input" required placeholder="Enter Sovereign Email" class="w-full bg-white/5 border border-white/20 p-5 rounded-2xl text-center font-bold outline-none focus:border-pink-500">
                    <button type="submit" class="w-full neon-sunset py-5 rounded-2xl font-black uppercase text-slate-950">Finalize Node Purchase</button>
                </form>
            </div>

            <div id="step-success" class="hidden">
                <i class="fa-solid fa-circle-check text-7xl text-green-400 mb-6 animate-bounce"></i>
                <h3 class="text-4xl font-black uppercase italic mb-2">Node Online</h3>
                <p class="text-slate-400 mb-8 italic">Check your email for the Island Credentials.</p>
                <button onclick="closeModal()" class="px-10 py-4 bg-white/10 rounded-xl font-black uppercase">Return to Bridge</button>
            </div>
        </div>
    </div>

    <nav class="fixed left-0 top-0 h-screen w-80 glass border-r border-white/10 p-10 flex flex-col justify-between z-50">
        <div class="text-4xl font-black uppercase italic tracking-tighter">Hatteras<br><span class="text-pink-500">Nexus</span></div>
        <button onclick="startActivation('Global Nexus')" class="neon-sunset py-5 rounded-2xl font-black uppercase text-xs text-slate-950 shadow-2xl">Activate AI Now</button>
    </nav>

    <main class="ml-80 w-full">
        <header class="min-h-screen neon-sunset flex items-center justify-center relative p-20">
            <div class="absolute inset-0 bg-slate-950/40"></div>
            <div class="relative z-10 text-center">
                <h1 class="text-[7rem] font-black uppercase italic leading-none mb-8">Hatteras<br><span class="text-cyan-400">Sovereign</span></h1>
                <p class="text-2xl font-bold mb-12">Building the Digital Delta.</p>
                <div class="grid md:grid-cols-3 gap-6 max-w-5xl mx-auto">
                    <div class="glass p-8 rounded-[2rem] border-t-4 border-pink-500">
                        <h4 class="font-black mb-4">Tri-Village</h4>
                        <button onclick="startActivation('Tri-Village Hub')" class="w-full py-3 bg-pink-500 rounded-xl font-black uppercase text-xs">Buy Node</button>
                    </div>
                    <div class="glass p-8 rounded-[2rem] border-t-4 border-orange-500">
                        <h4 class="font-black mb-4">Kinnakeet</h4>
                        <button onclick="startActivation('Kinnakeet Station')" class="w-full py-3 bg-orange-500 rounded-xl font-black uppercase text-xs">Buy Node</button>
                    </div>
                    <div class="glass p-8 rounded-[2rem] border-t-4 border-teal-400">
                        <h4 class="font-black mb-4">Sovereign</h4>
                        <button onclick="startActivation('Hatteras Core')" class="w-full py-3 bg-teal-400 rounded-xl font-black uppercase text-xs text-slate-950">Buy Node</button>
                    </div>
                </div>
            </div>
        </header>
    </main>

    <script>
        // Sound Generator
        const playSound = (freq, type) => {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.5);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.5);
        };

        function startActivation(nodeName) {
            playSound(440, 'sine'); // Start beep
            document.getElementById('activation-modal').classList.add('active');
            document.getElementById('scanner').classList.remove('hidden');
            document.getElementById('modal-title').innerText = "Syncing " + nodeName;
            
            setTimeout(() => { document.getElementById('bar').style.width = '100%'; }, 100);
            
            setTimeout(() => {
                document.getElementById('step-loading').classList.add('hidden');
                document.getElementById('scanner').classList.add('hidden');
                document.getElementById('step-email').classList.remove('hidden');
                playSound(880, 'square'); // Phase 2 beep
            }, 1600);
        }

        document.getElementById('node-form').onsubmit = (e) => {
            e.preventDefault();
            document.getElementById('step-email').classList.add('hidden');
            document.getElementById('step-success').classList.remove('hidden');
            document.body.style.background = "#064e3b"; // Island Power Green
            playSound(1200, 'sine'); // Success synth
        };

        function closeModal() {
            document.getElementById('activation-modal').classList.remove('active');
            document.getElementById('step-loading').classList.remove('hidden');
            document.getElementById('step-email').classList.add('hidden');
            document.getElementById('step-success').classList.add('hidden');
            document.getElementById('bar').style.width = '0%';
            document.body.style.background = "#020617";
        }
    </script>
</body>
</html>
