<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hatteras Nexus | Sovereign Node Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;900&display=swap');
        :root { --neon: linear-gradient(135deg, #ff007f 0%, #ff8c00 30%, #00d2ff 70%, #00f5d4 100%); }
        body { font-family: 'Outfit', sans-serif; background-color: #020617; color: white; overflow-x: hidden; }
        
        .neon-sunset { 
            background: var(--neon) !important; 
            background-size: 400% 400% !important; 
            animation: ripple 12s ease infinite !important; 
        }
        @keyframes ripple { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        #activation-modal {
            display: none; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center;
            background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(20px);
        }
        #activation-modal.active { display: flex; }
        
        .scan-line { width: 100%; height: 2px; background: #00f5d4; position: absolute; top: 0; animation: scan 2s linear infinite; box-shadow: 0 0 15px #00f5d4; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body class="flex">

    <div id="activation-modal">
        <div class="glass max-w-lg w-full p-12 rounded-[3rem] text-center relative overflow-hidden border-t-4 border-cyan-400">
            <div id="scanner" class="scan-line hidden"></div>
            
            <div id="step-sync">
                <i class="fa-solid fa-microchip text-5xl text-cyan-400 mb-6 animate-spin"></i>
                <h3 id="modal-title" class="text-3xl font-black uppercase italic">Syncing Node</h3>
                <div class="w-full bg-white/10 h-1 rounded-full mt-6">
                    <div id="bar" class="neon-sunset h-full w-0 transition-all duration-[1500ms]"></div>
                </div>
            </div>

            <div id="step-email" class="hidden">
                <h3 class="text-3xl font-black uppercase italic mb-4 text-pink-500">Identity Check</h3>
                <form id="stripe-form" class="space-y-4">
                    <input type="email" required placeholder="name@sovereign.com" class="w-full bg-white/5 border border-white/20 p-5 rounded-2xl text-center font-bold outline-none focus:border-cyan-400">
                    <button type="submit" class="w-full neon-sunset py-5 rounded-2xl font-black uppercase text-slate-950">Go to Stripe Checkout</button>
                </form>
            </div>

            <div id="step-redirect" class="hidden">
                <i class="fa-solid fa-circle-notch fa-spin text-5xl text-teal-400 mb-6"></i>
                <h3 class="text-2xl font-black uppercase italic">Securing Gateway...</h3>
            </div>
            
            <button onclick="closeModal()" class="mt-8 text-[10px] font-black uppercase tracking-widest text-white/20">Cancel</button>
        </div>
    </div>

    <nav id="side-nav" class="fixed left-0 top-0 h-screen w-80 glass border-r border-white/10 p-10 flex flex-col justify-between z-50">
        <div class="text-4xl font-black uppercase italic tracking-tighter">Hatteras<br><span class="text-pink-500">Nexus</span></div>
        <button onclick="openNode('Global Nexus', 'YOUR_STRIPE_LINK')" class="neon-sunset py-5 rounded-2xl font-black uppercase text-xs text-slate-950 shadow-2xl">Activate AI</button>
    </nav>

    <main id="main-content" class="ml-80 w-full">
        <header id="hero" class="min-h-screen neon-sunset flex items-center justify-center p-20 relative">
            <div class="absolute inset-0 bg-slate-950/40"></div>
            <div class="relative z-10 text-center">
                <h1 class="text-[7rem] font-black uppercase italic leading-none mb-8">Hatteras<br><span class="text-cyan-400">Sovereign</span></h1>
                <div class="grid md:grid-cols-3 gap-6">
                    <div class="glass p-8 rounded-[2rem] border-t-4 border-pink-500">
                        <h4 class="font-black mb-4">Tri-Village</h4>
                        <button onclick="openNode('Tri-Village', 'YOUR_LINK_1')" class="w-full py-3 bg-pink-500 rounded-xl font-black uppercase text-xs">Buy Node</button>
                    </div>
                    <div class="glass p-8 rounded-[2rem] border-t-4 border-orange-500">
                        <h4 class="font-black mb-4">Kinnakeet</h4>
                        <button onclick="openNode('Kinnakeet', 'YOUR_LINK_2')" class="w-full py-3 bg-orange-500 rounded-xl font-black uppercase text-xs">Buy Node</button>
                    </div>
                    <div class="glass p-8 rounded-[2rem] border-t-4 border-teal-400">
                        <h4 class="font-black mb-4">Sovereign</h4>
                        <button onclick="openNode('Sovereign', 'YOUR_LINK_3')" class="w-full py-3 bg-teal-400 rounded-xl font-black uppercase text-xs text-slate-950">Buy Node</button>
                    </div>
                </div>
            </div>
        </header>
    </main>

    <section id="success-screen" class="hidden fixed inset-0 z-[200] neon-sunset flex items-center justify-center p-10 text-center">
        <div class="glass p-16 rounded-[4rem] max-w-4xl w-full border-4 border-teal-400 relative overflow-hidden">
            <i class="fa-solid fa-tower-broadcast text-6xl text-white mb-6 animate-pulse"></i>
            <h2 class="text-6xl font-black uppercase italic mb-4">Provisioning Complete</h2>
            
            <div class="grid grid-cols-2 gap-4 my-10 text-left">
                <div class="glass p-6 rounded-2xl">
                    <p class="text-[10px] uppercase font-black text-teal-400">Node Location</p>
                    <p class="text-xl font-bold italic" id="loc-data">35.2281° N, 75.5342° W</p>
                </div>
                <div class="glass p-6 rounded-2xl">
                    <p class="text-[10px] uppercase font-black text-pink-500">Signal Strength</p>
                    <p class="text-xl font-bold italic">99.8% Optimized</p>
                </div>
                <div class="glass p-6 rounded-2xl col-span-2 text-center">
                    <p class="text-[10px] uppercase font-black text-cyan-400">Access Key</p>
                    <p class="text-xl font-mono">NX-HAT-772-DELTA-PRO</p>
                </div>
            </div>

            <button onclick="window.location.href='index.html'" class="bg-white text-slate-950 px-12 py-5 rounded-2xl font-black uppercase">Launch Control Panel</button>
        </div>
    </section>

    <script>
        let currentLink = "";
        const audio = new (window.AudioContext || window.webkitAudioContext)();

        function beep(f) {
            const o = audio.createOscillator(); const g = audio.createGain();
            o.frequency.value = f; g.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + 1);
            o.connect(g); g.connect(audio.destination); o.start(); o.stop(audio.currentTime + 1);
        }

        function openNode(name, url) {
            currentLink = url;
            beep(400);
            document.getElementById('activation-modal').classList.add('active');
            document.getElementById('scanner').classList.remove('hidden');
            setTimeout(() => { document.getElementById('bar').style.width = '100%'; }, 100);
            setTimeout(() => {
                document.getElementById('step-sync').classList.add('hidden');
                document.getElementById('scanner').classList.add('hidden');
                document.getElementById('step-email').classList.remove('hidden');
            }, 1600);
        }

        document.getElementById('stripe-form').onsubmit = (e) => {
            e.preventDefault();
            document.getElementById('step-email').classList.add('hidden');
            document.getElementById('step-redirect').classList.remove('hidden');
            setTimeout(() => { 
                if(currentLink.includes("YOUR")) alert("Don't forget to add your real Stripe Link!");
                else window.location.href = currentLink; 
            }, 1000);
        };

        function closeModal() {
            document.getElementById('activation-modal').classList.remove('active');
            document.getElementById('step-sync').classList.remove('hidden');
            document.getElementById('step-email').classList.add('hidden');
            document.getElementById('step-redirect').classList.add('hidden');
            document.getElementById('bar').style.width = '0%';
        }

        window.addEventListener('load', () => {
            if (window.location.hash === '#success') {
                document.getElementById('main-content').classList.add('hidden');
                document.getElementById('side-nav').classList.add('hidden');
                document.getElementById('success-screen').classList.remove('hidden');
                [523, 659, 783].forEach((f, i) => setTimeout(() => beep(f), i * 150));
            }
        });
    </script>
</body>
</html>
